spring:
  datasource:
    url: jdbc:mysql://localhost:3306/demo?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      timeout: 3s
  cache:
    type: redis
    redis:
      cache-null-values: false
      key-prefix: "springboot-demo:"

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    path: /var/log/springboot-demo
  level:
    root: INFO
    demo: INFO

app:
  messaging:
    enabled: true
  cors:
    allowed-origins: https://youdomain.com
    allowed-methods: GET,POST
    max-age: 7200


security:
  auth:
    ip-whitelist:
      - 127.0.0.1
      - 192.168.1.1

# JWT 配置（生产环境）
jwt: { secret: ${JWT_SECRET:CHANGE_THIS_TO_A_VERY_LONG_RANDOM_STRING_AT_LEAST_32_CHARS}, expiration: 3600000 }

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
