spring:
  datasource:
    url: jdbc:mysql://localhost:3306/demo?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    path: /var/log/springboot-demo
  level:
    root: INFO
    demo: INFO

app:
  allowed-origins: https://youdomain.com
  allowed-methods: GET,POST
  max-age: 7200

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

security:
  auth:
    ip-whitelist:
      - 127.0.0.1
      - 192.168.1.1

# JWT 配置（生产环境）
jwt:
  # ⚠️ 重要：生产环境必须使用环境变量设置强密钥
  # 生成强密钥命令：openssl rand -base64 64
  # Linux/Mac: export JWT_SECRET="your-complex-secret-key-here"
  # Windows: set JWT_SECRET="your-complex-secret-key-here"
  secret: ${JWT_SECRET:CHANGE_THIS_TO_A_VERY_LONG_RANDOM_STRING_AT_LEAST_32_CHARS}
  # Token 过期时间（毫秒），生产环境建议缩短为 1 小时
  expiration: 3600000
