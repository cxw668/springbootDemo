spring:
  datasource:
    url: jdbc:mysql://localhost:3306/demo?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      timeout: 3s
      database: 0
  cache:
    type: none  # 完全禁用缓存
#    redis:
#      cache-null-values: false
#      key-prefix: "springboot-demo:"
  rabbitmq:
    enabled: false  # 开发阶段禁用消息队列
    dynamic: false
    listener:
      simple:
        auto-startup: false  # 不自动启动消费者
      direct:
        auto-startup: false
  ai:
    openai:
      api-key: ${SILICONFLOW_API_KEY:not-configured}
      base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn}
      chat:
        options:
          model: ${SILICONFLOW_CHAT_MODEL:Qwen/Qwen3.5-4B}
          temperature: ${SILICONFLOW_TEMPERATURE:0.7}

#  sql:
#    init:
#      mode: always  # 每次启动都执行 SQL 初始化
#      schema-locations: classpath:schema.sql  # 指定 schema.sql 位置

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  file:
    path: logs
  level:
    org.springframework.boot.autoconfigure: WARN
    root: DEBUG
    demo: DEBUG

app:
  messaging:
    enabled: false  # 开发阶段禁用消息队列功能
  cors:
    allowed-origins: "*"
  file-upload:
    upload-dir: ./uploads
    allowed-file-types:
      - jpg
      - png
      - gif
      - jpeg
      - webp
    max-file-size: 10485760
    allowed-file-extensions:
      - .jpg
      - .png
      - .gif
      - .jpeg
      - .webp

springdoc:
  api-docs:
    enabled: true                    # 启用 API 文档
    path: /v3/api-docs               # OpenAPI JSON 路径
  swagger-ui:
    enabled: true                    # 启用 Swagger UI
    path: /swagger-ui.html           # Swagger UI 访问路径
    tags-sorter: alpha               # 标签按字母排序
    operations-sorter: alpha         # 接口按字母排序
  default-flat-param-object: true    # 参数对象扁平化展示

# JWT 配置
jwt:
  secret: mySecretKeyForSpringBootDemo2024VeryLong # 生产环境请使用更复杂的密钥，建议从环境变量读取
  expiration: 7200000 # Token 过期时间（毫秒），默认 2 小时
