spring:
  datasource:
    url: jdbc:mysql://localhost:3306/demo?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  file:
    path: logs
  level:
    root: DEBUG
    demo: DEBUG

app:
  cors:
    allowed-origins: "*"
  file-upload:
    upload-dir: ./uploads
    allowed-file-types:
      - jpg
      - png
      - gif
      - jpeg
      - webp
    max-file-size: 10485760
    allowed-file-extensions:
      - .jpg
      - .png
      - .gif
      - .jpeg
      - .webp

springdoc:
  api-docs:
    enabled: true                    # 启用 API 文档
    path: /v3/api-docs               # OpenAPI JSON 路径
  swagger-ui:
    enabled: true                    # 启用 Swagger UI
    path: /swagger-ui.html           # Swagger UI 访问路径
    tags-sorter: alpha               # 标签按字母排序
    operations-sorter: alpha         # 接口按字母排序
  default-flat-param-object: true    # 参数对象扁平化展示