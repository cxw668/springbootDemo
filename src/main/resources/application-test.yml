spring:
  datasource:
    url: jdbc:h2:mem:demo;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  ai:
    open:
      api-key: test-siliconflow-key
      base-url: https://api.siliconflow.cn
      chat:
        options:
          model: Qwen/Qwen3.5-4B
  cache:
    type: simple
  rabbitmq:
    dynamic: false
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

app:
  messaging:
    enabled: false
  ai:
    enabled: false
    provider: SiliconFlow
    default-system-prompt: 你是一个有用的助手
  default-page-size: 5
  max-page-size: 50
  cors:
    allowed-origins: "*"

# JWT 配置（测试环境）
jwt:
  # 测试环境可以使用简单密钥
  secret: test-secret-key-for-jwt-testing-purpose-only
  # Token 过期时间设置为 2 小时，方便测试
  expiration: 7200000
