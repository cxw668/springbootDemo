spring:
  application:
    name: springboot-demo
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: dev
  datasource:
    url: jdbc:mysql://localhost:3306/demo?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms
  cache:
    type: redis
    redis:
      cache-null-values: false
      key-prefix: "springboot-demo:"
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    publisher-confirm-type: correlated
    publisher-returns: true
    template:
      mandatory: true
    listener:
      simple:
        default-requeue-rejected: false # 被拒绝的消息不重回队列，而是进入 DLQ（死信队列）
        prefetch: 10
  ai:
    openai:
      api-key: ${SILICONFLOW_API_KEY:not-configured}
      base-url: ${SILICONFLOW_BASE_URL:https://api.siliconflow.cn}
      chat:
        options:
          model: ${SILICONFLOW_CHAT_MODEL:Qwen/Qwen3.5-4B}
          temperature: ${SILICONFLOW_TEMPERATURE:0.7}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  file:
    path: logs
  level:
    root: INFO
    demo: INFO

springdoc:
  api-docs:
    enabled: true                    # 启用 API 文档
    path: /v3/api-docs               # OpenAPI JSON 路径
  swagger-ui:
    enabled: true                    # 启用 Swagger UI
    path: /swagger-ui.html           # Swagger UI 访问路径
    tags-sorter: alpha               # 标签按字母排序
    operations-sorter: alpha         # 接口按字母排序
    doc-expansion: list              # 默认展开所有接口（none=折叠, list=展开列表, full=完全展开）
  default-flat-param-object: true    # 参数对象扁平化展示

app:
  version: 1.0.0
  name: SpringBoot Demo
  description: 一个用于学习和巩固SpringBoot的项目，后续会持续更新。
  default-page-size: 10
  max-page-size: 100
  cors:
    max-age: 3600
    allowed-origins: '*'
    allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  messaging:
    enabled: true
  ai:
    enabled: true
    provider: SiliconFlow
    default-system-prompt: 你是一个有用的助手
  file-upload:
    upload-dir: ./uploads/avatars
    max-file-size: 10485760
    allowed-file-extensions:
      - .jpg
      - .jpeg
      - .png
      - .gif
      - .webp
    allowed-file-types:
      - image/jpeg
      - image/jpg
      - image/png
      - image/gif
      - image/webp
  job:
    user-stats-cron: "0 0 8 * * ?"  # 每天早上8点统计用户数据
    file-cleanup-cron: "0 0 2 * * ?"  # 每天凌晨2点清理过期文件
    file-retention-days: 7  # 文件保留天数

# JWT 配置
jwt:
  secret: mySecretKeyForSpringBootDemo2024VeryLong # 生产环境请使用更复杂的密钥，建议从环境变量读取
  expiration: 7200000 # Token 过期时间（毫秒），默认 2 小时
